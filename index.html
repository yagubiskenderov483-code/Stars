<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fragment</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  :root {
    --tg-blue:#2AABEE; --tg-bg:#f0f2f5; --card-bg:#ffffff;
    --input-bg:#f1f3f6; --text-main:#1c1c1e; --text-muted:#8e8e93; --border:#e0e0e5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--tg-bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;position:relative;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;
    background-image:
      radial-gradient(circle at 15% 15%,rgba(42,171,238,.18) 0%,transparent 40%),
      radial-gradient(circle at 85% 80%,rgba(42,171,238,.15) 0%,transparent 40%),
      radial-gradient(circle at 50% 50%,rgba(42,171,238,.06) 0%,transparent 65%),
      radial-gradient(circle at 80% 10%,rgba(42,171,238,.10) 0%,transparent 30%),
      radial-gradient(circle at 10% 85%,rgba(42,171,238,.10) 0%,transparent 30%);
    pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;
    background-image:radial-gradient(circle,#2AABEE28 1px,transparent 1px);
    background-size:28px 28px;pointer-events:none;z-index:0;}
  .bg-hex{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .bg-hex svg{width:100%;height:100%;opacity:0.045;}
  .deco{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
  .deco-1{width:300px;height:300px;top:-100px;right:-100px;background:radial-gradient(circle,#2AABEE44,transparent 70%);animation:float1 8s ease-in-out infinite;}
  .deco-2{width:220px;height:220px;bottom:20px;left:-80px;background:radial-gradient(circle,#2AABEE33,transparent 70%);animation:float2 10s ease-in-out infinite;}
  .deco-3{width:150px;height:150px;top:40%;right:-40px;background:radial-gradient(circle,#2AABEE22,transparent 70%);animation:float1 12s ease-in-out infinite reverse;}
  .deco-4{width:100px;height:100px;top:25%;left:-20px;background:radial-gradient(circle,#2AABEE18,transparent 70%);animation:float2 9s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-22px) scale(1.04)}}
  @keyframes float2{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(16px) scale(0.97)}}
  .bg-lines{position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(42,171,238,0.025) 40px,rgba(42,171,238,0.025) 41px);}
  .splash{position:fixed;inset:0;background:linear-gradient(160deg,#0d1b2e,#1a3a5c,#0d1b2e);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:splashOut 0.5s ease 2.2s both;}
  @keyframes splashOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.04);pointer-events:none;visibility:hidden;}}
  .splash-bg{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(42,171,238,0.08) 1px,transparent 1px);background-size:24px 24px;}
  .splash-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(42,171,238,0.25),transparent 70%);animation:glowPulse 2s ease-in-out infinite;}
  @keyframes glowPulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.15);opacity:1}}
  .splash-logo-wrap{position:relative;z-index:1;animation:logoAppear 0.6s cubic-bezier(.22,.68,0,1.4) 0.2s both;}
  @keyframes logoAppear{from{opacity:0;transform:scale(0.3)}to{opacity:1;transform:scale(1)}}
  .splash-circle{width:110px;height:110px;background:linear-gradient(145deg,#2AABEE,#1a7fc1);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(42,171,238,0.7),0 0 120px rgba(42,171,238,0.3);position:relative;overflow:hidden;}
  .splash-circle::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.3),transparent 65%);border-radius:50%;}
  .splash-circle svg{width:60px;height:60px;fill:white;position:relative;z-index:1;}
  .splash-ring{position:absolute;border-radius:50%;border:2px solid rgba(42,171,238,0.4);animation:ringExpand 2s ease-out infinite;}
  .splash-ring:nth-child(1){width:130px;height:130px;animation-delay:0s;}
  .splash-ring:nth-child(2){width:170px;height:170px;animation-delay:0.4s;}
  .splash-ring:nth-child(3){width:210px;height:210px;animation-delay:0.8s;}
  @keyframes ringExpand{from{transform:scale(0.8);opacity:0.8}to{transform:scale(1.4);opacity:0}}
  .splash-text{position:relative;z-index:1;margin-top:28px;text-align:center;animation:logoAppear 0.5s ease 0.7s both;}
  .splash-text h1{font-size:32px;font-weight:900;color:white;letter-spacing:-0.5px;}
  .splash-text p{font-size:14px;color:rgba(255,255,255,0.5);font-weight:600;margin-top:4px;letter-spacing:2px;text-transform:uppercase;}
  .splash-dots{display:flex;gap:8px;margin-top:40px;position:relative;z-index:1;animation:logoAppear 0.4s ease 1s both;}
  .splash-dot{width:8px;height:8px;border-radius:50%;background:rgba(42,171,238,0.4);}
  .splash-dot:nth-child(1){animation:dotBounce 1.2s ease 1s infinite;}
  .splash-dot:nth-child(2){animation:dotBounce 1.2s ease 1.2s infinite;}
  .splash-dot:nth-child(3){animation:dotBounce 1.2s ease 1.4s infinite;}
  @keyframes dotBounce{0%,80%,100%{background:rgba(42,171,238,0.3);transform:scale(1)}40%{background:#2AABEE;transform:scale(1.4)}}
  .topbar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;position:relative;z-index:10;}
  .topbar-back{color:var(--tg-blue);font-size:17px;font-weight:700;cursor:pointer;min-width:60px;user-select:none;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  .topbar-back.visible{opacity:1;pointer-events:auto;}
  .topbar-back:active{opacity:0.6;}
  .topbar-title{text-align:center;}
  .topbar-title span{display:block;font-size:17px;font-weight:800;color:var(--text-main);}
  .topbar-title small{font-size:12px;color:var(--text-muted);font-weight:600;}
  .topbar-spacer{min-width:60px;}
  .card{width:calc(100% - 24px);max-width:460px;background:var(--card-bg);border-radius:24px;padding:36px 28px 28px;box-shadow:0 8px 40px rgba(42,171,238,.10),0 2px 12px rgba(0,0,0,.06);position:relative;z-index:10;margin-top:4px;animation:slideUp 0.5s cubic-bezier(.22,.68,0,1.2) both;}
  @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  .logo-wrap{display:flex;justify-content:center;margin-bottom:18px;}
  .logo-circle{width:72px;height:72px;background:linear-gradient(135deg,#2AABEE,#1e88c8);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(42,171,238,.35);position:relative;overflow:hidden;}
  .logo-circle::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.25),transparent 70%);border-radius:50%;}
  .logo-circle svg{width:38px;height:38px;fill:white;position:relative;z-index:1;}
  .screen-title{font-size:26px;font-weight:900;color:var(--text-main);text-align:center;margin-bottom:4px;letter-spacing:-.5px;}
  .screen-sub{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:24px;}
  .screen-sub a{color:var(--tg-blue);text-decoration:none;font-weight:700;}
  .steps{display:flex;justify-content:center;gap:8px;margin-bottom:20px;}
  .step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background 0.3s,width 0.3s;}
  .step-dot.active{background:var(--tg-blue);width:24px;border-radius:4px;}
  .input-group{margin-bottom:12px;position:relative;}
  .select-wrap{background:var(--input-bg);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:2px solid transparent;transition:border-color .2s;}
  .select-wrap.open{border-color:var(--tg-blue);}
  .select-left{display:flex;align-items:center;gap:10px;}
  .select-flag{font-size:22px;}
  .select-country{font-size:16px;font-weight:700;color:var(--text-main);}
  .select-arrow{color:var(--text-muted);font-size:18px;}
  .dropdown{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:white;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.13);z-index:100;max-height:240px;overflow-y:auto;border:1.5px solid var(--border);}
  .dropdown.open{display:block;animation:fadeDown .18s ease both;}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .dd-search{padding:10px 14px 6px;position:sticky;top:0;background:white;border-bottom:1px solid var(--border);}
  .dd-search input{width:100%;border:none;outline:none;font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--text-main);background:var(--input-bg);border-radius:8px;padding:7px 10px;}
  .dd-item{padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px;font-weight:600;color:var(--text-main);border-bottom:1px solid #f2f2f2;transition:background .1s;}
  .dd-item:last-child{border-bottom:none;}
  .dd-item:hover{background:var(--input-bg);}
  .dd-item .dd-code{color:var(--text-muted);font-weight:700;font-size:13px;margin-left:auto;}
  .phone-wrap{background:var(--input-bg);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;border:2px solid transparent;transition:border-color .2s;}
  .phone-wrap:focus-within{border-color:var(--tg-blue);}
  .phone-prefix{font-size:16px;font-weight:800;color:var(--text-main);white-space:nowrap;}
  .phone-input{border:none;outline:none;background:transparent;font-size:16px;font-weight:700;color:var(--text-main);font-family:'Nunito',sans-serif;width:100%;letter-spacing:1px;}
  .phone-input::placeholder{color:var(--text-muted);letter-spacing:0;font-weight:600;}
  .example-hint{font-size:12px;color:var(--text-muted);font-weight:600;margin-top:6px;padding-left:4px;}
  .btn-main{width:100%;background:linear-gradient(135deg,#2AABEE,#1e8fd1);border:none;border-radius:14px;padding:16px;color:white;font-size:17px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:8px;letter-spacing:.2px;box-shadow:0 4px 16px rgba(42,171,238,.35);transition:transform .15s,opacity .15s;position:relative;overflow:hidden;}
  .btn-main::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(255,255,255,.18),transparent 65%);}
  .btn-main:active{transform:scale(.97);}
  .btn-main:hover{opacity:.95;}
  .secure-badge{text-align:center;margin-top:18px;font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;}
  .error-msg{color:#e53935;font-size:13px;font-weight:700;margin-top:6px;padding-left:4px;display:none;}
  .error-msg.show{display:block;animation:shake .3s both;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .code-hint{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:22px;font-weight:600;line-height:1.5;}
  .code-hint strong{color:var(--text-main);}
  .code-boxes{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
  .code-box{width:48px;height:56px;background:var(--input-bg);border-radius:12px;border:2px solid transparent;font-size:24px;font-weight:900;color:var(--text-main);text-align:center;font-family:'Nunito',sans-serif;outline:none;transition:border-color .18s,box-shadow .18s;}
  .code-box:focus{border-color:var(--tg-blue);box-shadow:0 0 0 3px rgba(42,171,238,.13);}
  .code-box.filled{background:#eaf6fd;border-color:var(--tg-blue);}
  .resend-row{text-align:center;margin-top:6px;font-size:13px;color:var(--text-muted);font-weight:600;}
  .resend-link{color:var(--tg-blue);cursor:pointer;font-weight:700;}
  .twofa-icon{font-size:42px;text-align:center;margin-bottom:10px;}
  .twofa-info{background:linear-gradient(135deg,#eaf6fd,#f0f8ff);border-radius:14px;padding:14px 16px;margin-bottom:16px;border-left:4px solid var(--tg-blue);}
  .twofa-info p{font-size:14px;font-weight:600;color:var(--text-main);line-height:1.5;}
  .twofa-info p strong{color:var(--tg-blue);}
  .pass-wrap{background:var(--input-bg);border-radius:14px;padding:14px 16px;display:flex;align-items:center;border:2px solid transparent;transition:border-color .2s;gap:10px;}
  .pass-wrap:focus-within{border-color:var(--tg-blue);}
  .pass-input{border:none;outline:none;background:transparent;font-size:16px;font-weight:700;color:var(--text-main);font-family:'Nunito',sans-serif;width:100%;letter-spacing:2px;}
  .pass-input::placeholder{letter-spacing:0;font-weight:600;color:var(--text-muted);}
  .eye-btn{cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1;user-select:none;}
  .eye-btn:hover{color:var(--tg-blue);}
  .dash-header{text-align:center;margin-bottom:22px;}
  .dash-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#2AABEE,#1e88c8);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:28px;box-shadow:0 4px 16px rgba(42,171,238,.3);}
  .dash-name{font-size:20px;font-weight:900;color:var(--text-main);}
  .dash-handle{font-size:13px;color:var(--text-muted);font-weight:600;margin-top:2px;}
  .stars-card{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border-radius:20px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2);}
  .stars-card::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,215,0,.06) 1px,transparent 1px);background-size:20px 20px;}
  .stars-card-label{font-size:12px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
  .stars-balance{display:flex;align-items:center;gap:10px;}
  .stars-icon{font-size:36px;filter:drop-shadow(0 0 8px rgba(255,215,0,.6));}
  .stars-amount{font-size:42px;font-weight:900;color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,.4);}
  .stars-unit{font-size:16px;font-weight:700;color:rgba(255,255,255,.6);align-self:flex-end;padding-bottom:8px;}
  .stars-usd{font-size:13px;color:rgba(255,255,255,.4);font-weight:600;margin-top:4px;}
  .sparkles{position:absolute;top:12px;right:16px;font-size:24px;opacity:0.4;animation:sparkle 3s ease-in-out infinite;}
  @keyframes sparkle{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.1)}}
  .action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .action-btn{border:none;border-radius:14px;padding:14px 10px;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .15s,opacity .15s;}
  .action-btn:active{transform:scale(.96);}
  .action-btn .action-icon{font-size:22px;}
  .action-btn.deposit{background:linear-gradient(135deg,#00c851,#007e33);color:white;box-shadow:0 4px 14px rgba(0,200,81,.3);}
  .action-btn.withdraw{background:linear-gradient(135deg,#2AABEE,#1e8fd1);color:white;box-shadow:0 4px 14px rgba(42,171,238,.3);}
  .section-title{font-size:13px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .tx-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
  .tx-item:last-child{border-bottom:none;}
  .tx-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .tx-icon.in{background:#e8faf0;}
  .tx-icon.out{background:#eaf6fd;}
  .tx-info{flex:1;}
  .tx-label{font-size:14px;font-weight:700;color:var(--text-main);}
  .tx-date{font-size:12px;color:var(--text-muted);font-weight:600;margin-top:1px;}
  .tx-amount{font-size:15px;font-weight:900;}
  .tx-amount.in{color:#00c851;}
  .tx-amount.out{color:var(--tg-blue);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:flex-end;justify-content:center;}
  .modal-overlay.show{display:flex;animation:fadeIn .2s ease both;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal-sheet{background:white;border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:480px;animation:slideSheet .3s cubic-bezier(.22,.68,0,1.2) both;}
  @keyframes slideSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
  .modal-title{font-size:20px;font-weight:900;color:var(--text-main);margin-bottom:6px;}
  .modal-sub{font-size:14px;color:var(--text-muted);font-weight:600;margin-bottom:20px;}
  .amount-input-wrap{background:var(--input-bg);border-radius:14px;padding:16px;display:flex;align-items:center;gap:10px;border:2px solid transparent;transition:border-color .2s;margin-bottom:8px;}
  .amount-input-wrap:focus-within{border-color:var(--tg-blue);}
  .amount-star{font-size:22px;}
  .amount-input{border:none;outline:none;background:transparent;font-size:22px;font-weight:900;color:var(--text-main);font-family:'Nunito',sans-serif;width:100%;}
  .amount-input::placeholder{color:var(--text-muted);font-weight:600;font-size:18px;}
  .amount-usd{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:16px;padding-left:4px;}
  .quick-amounts{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .quick-btn{border:1.5px solid var(--tg-blue);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:800;color:var(--tg-blue);background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;transition:background .15s,color .15s;}
  .quick-btn:hover{background:var(--tg-blue);color:white;}
  .timer-wrap{text-align:center;padding:10px 0;}
  .timer-icon{font-size:52px;margin-bottom:12px;animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .timer-title{font-size:22px;font-weight:900;color:var(--text-main);margin-bottom:6px;}
  .timer-sub{font-size:14px;color:var(--text-muted);font-weight:600;margin-bottom:24px;line-height:1.5;}
  .timer-circle{width:110px;height:110px;border-radius:50%;border:6px solid var(--input-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;background:white;box-shadow:0 4px 20px rgba(42,171,238,.15);}
  .timer-number{font-size:32px;font-weight:900;color:var(--tg-blue);line-height:1;}
  .timer-label{font-size:11px;font-weight:700;color:var(--text-muted);}
  .deposit-option{display:flex;align-items:center;gap:14px;padding:14px;background:var(--input-bg);border-radius:14px;margin-bottom:10px;cursor:pointer;transition:background .15s;border:2px solid transparent;}
  .deposit-option:hover{border-color:var(--tg-blue);background:#eaf6fd;}
  .deposit-option-icon{font-size:28px;}
  .deposit-option-info{flex:1;}
  .deposit-option-name{font-size:15px;font-weight:800;color:var(--text-main);}
  .deposit-option-desc{font-size:12px;color:var(--text-muted);font-weight:600;}
  .deposit-option-arrow{color:var(--text-muted);font-size:18px;}
  .btn-gray{background:var(--input-bg);color:var(--text-main);box-shadow:none;}
  .dropdown::-webkit-scrollbar{width:5px;}
  .dropdown::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
  .code-error{color:#e53935;font-size:13px;font-weight:700;text-align:center;margin-top:8px;display:none;}
  .code-error.show{display:block;}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-bg"></div>
  <div class="splash-glow"></div>
  <div class="splash-ring"></div>
  <div class="splash-ring"></div>
  <div class="splash-ring"></div>
  <div class="splash-logo-wrap">
    <div class="splash-circle">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/></svg>
    </div>
  </div>
  <div class="splash-text">
    <h1>Fragment</h1>
    <p>by Telegram</p>
