<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Test</title>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            text-align: center;
        }
        input, button {
            padding: 12px;
            font-size: 16px;
            margin: 10px;
        }
        .status {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Telegram WebApp Test</h2>
    <input type="text" id="phone" placeholder="906 480 08 08">
    <button onclick="send()">Отправить</button>
    <div class="status" id="status"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        function send() {
            let raw = document.getElementById('phone').value;
            raw = raw.replace(/\D/g, '');
            const phone = '+7' + raw;
            
            const data = JSON.stringify({
                action: "send_code",
                phone: phone
            });
            
            document.getElementById('status').innerHTML = '📱 Отправляю: ' + phone;
            
            try {
                tg.sendData(data);
                document.getElementById('status').innerHTML = '✅ Отправлено!';
            } catch(e) {
                document.getElementById('status').innerHTML = '❌ Ошибка: ' + e.message;
            }
        }
    </script>
</body>
</html>
